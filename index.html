<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Tower Walkie-Talkie</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 400px; margin: auto; padding: 20px; background: white; border: 1px solid #ccc; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        select, input, button { padding: 10px; margin: 10px 0; width: 90%; font-size: 16px; border-radius: 5px; border: 1px solid #ccc;}
        
        #dashboard { display: none; } 
        
        .status-box { background: #e9ecef; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        .status-box p { margin: 5px 0; font-weight: bold; }

        #ptt-btn {
            background-color: #555; color: white; height: 120px; border-radius: 60px;
            border: none; cursor: pointer; user-select: none; font-size: 18px; font-weight: bold;
            transition: 0.2s; width: 90%;
        }
        #ptt-btn:active:not(:disabled) { background-color: #28a745; transform: scale(0.95); } 
        #ptt-btn:disabled { background-color: #dc3545; cursor: not-allowed; opacity: 0.7; } 

        #leave-btn { background-color: #6c757d; color: white; border: none; cursor: pointer; margin-top: 15px;}
        #leave-btn:hover { background-color: #5a6268; }
        
        .divider { font-size: 14px; color: #777; margin: 5px 0; }
    </style>
</head>
<body>

<div class="container" id="setup-screen">
    <h2>Connect to Radio Tower</h2>
    <p>Select a pre-fixed channel or create your own.</p>
    
    <select id="channel-select">
        <option value="General-Lobby">General Lobby</option>
        <option value="Alpha-Squad">Alpha Squad</option>
        <option value="Beta-Team">Beta Team</option>
        <option value="Dispatch-Control">Dispatch Control</option>
    </select>

    <div class="divider">─ OR CREATE CUSTOM ─</div>

    <input type="text" id="channel-custom" placeholder="Type custom channel name...">
    
    <button id="join-btn" style="background-color: #007bff; color: white; border: none;">Connect Radio</button>
</div>

<div class="container" id="dashboard">
    <h2>Radio Tower</h2>
    
    <div class="status-box">
        <p>Channel: <span id="ui-channel" style="color: #007bff;">...</span></p>
        <p>Active Users: <span id="ui-count" style="color: #28a745;">1</span></p>
        <p id="ui-who-talking" style="color: #dc3545; font-size: 14px;">Channel is open.</p>
    </div>

    <button id="ptt-btn" disabled>Waiting for Mic...</button>
    
    <button id="leave-btn">Leave Channel</button>
    
    <div id="audio-container"></div>
</div>

<script>
    // ==========================================
    // 1. FIREBASE CONFIG
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyAN2KhtSuruzJVAMbtM6AYF34TfNAzqtrk",
        authDomain: "web-walkie-talkie.firebaseapp.com",
        databaseURL: "https://web-walkie-talkie-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "web-walkie-talkie",
        storageBucket: "web-walkie-talkie.firebasestorage.app",
        messagingSenderId: "540679406004",
        appId: "1:540679406004:web:20d5ace367b173758af2e1"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ==========================================
    // 2. PURE WEBRTC GLOBAL VARIABLES
    // ==========================================
    const myId = Math.floor(100000 + Math.random() * 900000).toString(); 
    
    // Metered TURN Servers
    const rtcConfig = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'turn:global.relay.metered.ca:80', username: '6aab54034dc79a1202170b90', credential: 'mgAvGdQTO/UdvH3p' },
            { urls: 'turn:global.relay.metered.ca:443', username: '6aab54034dc79a1202170b90', credential: 'mgAvGdQTO/UdvH3p' },
            { urls: 'turn:global.relay.metered.ca:443?transport=tcp', username: '6aab54034dc79a1202170b90', credential: 'mgAvGdQTO/UdvH3p' }
        ]
    };

    let localStream;
    let currentChannel = "";
    let peers = {}; // Holds raw WebRTC connections
    
    let channelRef, myUserRef, talkingRef;

    const setupScreen = document.getElementById('setup-screen');
    const dashboard = document.getElementById('dashboard');
    const pttBtn = document.getElementById('ptt-btn');
    const uiCount = document.getElementById('ui-count');
    const uiWhoTalking = document.getElementById('ui-who-talking');

    // ==========================================
    // 3. JOINING A CHANNEL
    // ==========================================
    document.getElementById('join-btn').onclick = async () => {
        const selectVal = document.getElementById('channel-select').value;
        const customVal = document.getElementById('channel-custom').value.trim();
        
        currentChannel = customVal ? customVal.replace(/[^a-zA-Z0-9-_]/g, '') : selectVal;
        if(!currentChannel) return alert("Please select or type a valid channel name!");

        try {
            if (!localStream) {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            }
            localStream.getAudioTracks()[0].enabled = false; // Muted by default
            
            setupScreen.style.display = 'none';
            dashboard.style.display = 'block';
            document.getElementById('ui-channel').innerText = currentChannel;
            pttBtn.innerText = "Hold to Talk";
            pttBtn.disabled = false;

            connectToFirebaseTower();

        } catch (err) {
            alert("Microphone required! Please check your browser permissions.");
            console.error(err);
        }
    };

    // ==========================================
    // 4. LEAVING A CHANNEL CLEANUP
    // ==========================================
    document.getElementById('leave-btn').onclick = () => {
        if (!currentChannel) return;

        if (pttBtn.innerText === "Transmitting...") {
            localStream.getAudioTracks()[0].enabled = false;
            talkingRef.set(null);
        }

        // Close all raw WebRTC connections
        Object.values(peers).forEach(pc => pc.close());
        peers = {};

        // Turn off all Firebase listeners
        if (myUserRef) {
            myUserRef.child('offers').off();
            myUserRef.child('answers').off();
            myUserRef.child('candidates').off();
            myUserRef.remove();
        }
        if (channelRef) {
            channelRef.child('users').off();
            talkingRef.off();
        }

        document.getElementById('audio-container').innerHTML = "";
        currentChannel = "";
        dashboard.style.display = 'none';
        setupScreen.style.display = 'block';
        document.getElementById('channel-custom').value = ""; 
    };

    // ==========================================
    // 5. FIREBASE SIGNALING TOWER
    // ==========================================
    async function connectToFirebaseTower() {
        channelRef = database.ref(`channels/${currentChannel}`);
        myUserRef = channelRef.child(`users/${myId}`);
        talkingRef = channelRef.child('currently_talking');

        // Clear out any old connection data just in case, then announce presence
        await myUserRef.set(null);
        myUserRef.child('presence').set(true);
        myUserRef.onDisconnect().remove();

        // Track live users
        channelRef.child('users').on('value', (snapshot) => {
            uiCount.innerText = snapshot.numChildren();
        });

        // 5a. Automatically call new users who join (Mesh Network)
        channelRef.child('users').on('child_added', (snapshot) => {
            const partnerId = snapshot.key;
            // To prevent double-calling, only the older user initiates the call
            if (partnerId !== myId && myId > partnerId) {
                initiateCall(partnerId);
            }
        });

        // 5b. Cleanup if someone leaves
        channelRef.child('users').on('child_removed', (snapshot) => {
            const partnerId = snapshot.key;
            if (peers[partnerId]) {
                peers[partnerId].close();
                delete peers[partnerId];
            }
            const audioObj = document.getElementById(`audio-${partnerId}`);
            if (audioObj) audioObj.remove();
        });

        // --- THE MAGIC: FIREBASE REPLACING PEERJS ---
        
        // Listen for incoming offers from friends
        myUserRef.child('offers').on('child_added', async (snapshot) => {
            const partnerId = snapshot.key;
            const offer = snapshot.val();
            
            const pc = createPeerConnection(partnerId);
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            
            // Send our answer back via Firebase
            database.ref(`channels/${currentChannel}/users/${partnerId}/answers/${myId}`).set({
                type: answer.type,
                sdp: answer.sdp
            });
        });

        // Listen for answers to calls we initiated
        myUserRef.child('answers').on('child_added', async (snapshot) => {
            const partnerId = snapshot.key;
            const answer = snapshot.val();
            const pc = peers[partnerId];
            if (pc) {
                await pc.setRemoteDescription(new RTCSessionDescription(answer));
            }
        });

        // Listen for network firewall bypass codes (ICE Candidates)
        myUserRef.child('candidates').on('child_added', (snapshot) => {
            const data = snapshot.val();
            const pc = peers[data.sender];
            if (pc && data.candidate) {
                pc.addIceCandidate(new RTCIceCandidate(data.candidate)).catch(console.error);
            }
        });

        // ==========================================
        // 6. PUSH-TO-TALK LOCK
        // ==========================================
        talkingRef.on('value', (snapshot) => {
            const talkerId = snapshot.val();
            
            if (talkerId && talkerId !== myId) {
                pttBtn.disabled = true;
                pttBtn.innerText = "Channel Busy...";
                uiWhoTalking.innerText = `User ${talkerId} is transmitting...`;
            } else {
                pttBtn.disabled = false;
                pttBtn.innerText = talkerId === myId ? "Transmitting..." : "Hold to Talk";
                uiWhoTalking.innerText = talkerId === myId ? "You are transmitting." : "Channel is open.";
            }
        });

        const startTalking = () => {
            if(pttBtn.disabled) return;
            localStream.getAudioTracks()[0].enabled = true; 
            talkingRef.set(myId); 
        };

        const stopTalking = () => {
            if(!localStream) return;
            localStream.getAudioTracks()[0].enabled = false; 
            talkingRef.once('value').then(snap => {
                if(snap.val() === myId) talkingRef.set(null); 
            });
        };

        pttBtn.addEventListener('mousedown', startTalking);
        pttBtn.addEventListener('mouseup', stopTalking);
        pttBtn.addEventListener('mouseleave', stopTalking);
        pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startTalking(); });
        pttBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopTalking(); });
    }

    // ==========================================
    // 7. PURE WEBRTC CONNECTION BUILDER
    // ==========================================
    function createPeerConnection(partnerId) {
        const pc = new RTCPeerConnection(rtcConfig);
        peers[partnerId] = pc;

        // Add our microphone stream to the connection
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

        // When the Metered TURN server gives us a path through the firewall, send it to our friend via Firebase
        pc.onicecandidate = (event) => {
            if (event.candidate) {
                database.ref(`channels/${currentChannel}/users/${partnerId}/candidates`).push({
                    sender: myId,
                    candidate: event.candidate.toJSON()
                });
            }
        };

        // When we successfully receive our friend's audio stream
        pc.ontrack = (event) => {
            if (!document.getElementById(`audio-${partnerId}`)) {
                const audioObj = document.createElement('audio');
                audioObj.id = `audio-${partnerId}`;
                audioObj.srcObject = event.streams[0];
                audioObj.autoplay = true;
                audioObj.playsInline = true; // Crucial for iPhone Safari
                document.getElementById('audio-container').appendChild(audioObj);
                
                // Force playback
                audioObj.play().catch(e => console.error("Audio block:", e));
            }
        };

        return pc;
    }

    // Start a call
    async function initiateCall(partnerId) {
        const pc = createPeerConnection(partnerId);
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        
        // Send the offer via Firebase
        database.ref(`channels/${currentChannel}/users/${partnerId}/offers/${myId}`).set({
            type: offer.type,
            sdp: offer.sdp
        });
    }
</script>

</body>
</html>
